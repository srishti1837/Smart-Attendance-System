<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>DevOps Login</title>
</head>
<body>
    <div class="card">
        <div style="font-size: 50px; color: var(--primary-purple);">🏛️</div>
        <h3>Fundamental of DevOps</h3>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div style="color: #d32f2f; background: #ffebee; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; border: 1px solid #ffcdd2; font-weight: 500;">
                ⚠️ {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <input type="email" name="email" placeholder="📧 Email ID" required>
            <input type="password" name="password" placeholder="🔒 Password" required>
            <button type="submit" class="btn-primary" style="margin-top: 15px;">LOGIN</button>
        </form>

        <hr style="margin: 25px 0; border: 0; border-top: 1px solid #eee;">

        <form action="/register-check" method="POST">
            <input type="text" name="reg_code" placeholder="🔑 New User? Enter Code here">
            <button type="submit" class="btn-register">You can Register here Now</button>
        </form>
    </div>
</body>
</html>
