<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Student Registration</title>
</head>
<body>
    <div class="card" style="max-width: 450px; margin: 50px auto; padding: 30px;">
        <h2 style="color: #9c27b0; margin-bottom: 20px;">Student Registration</h2>
        
        <form action="/api/register" method="POST">
            <input type="hidden" name="prof_admin_code" value="{{ reg_code }}">

            <input type="text" name="name" placeholder="Full Name" required 
                   style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box;">
            
            <input type="email" name="email" placeholder="Email Address" required 
                   style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box;">
            
            <input type="text" name="enrollment" placeholder="Enrollment No" required 
                   style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box;">
            
            <select name="branch" required style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd;">
                <option value="" disabled selected>Select your Branch</option>
                {% if branches %}
                    {% for b in branches %}
                        <option value="{{ b }}">{{ b }}</option>
                    {% endfor %}
                {% endif %}
            </select>

            <input type="password" name="password" placeholder="Create Password" required 
                   style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box;">
            
            <button type="submit" class="btn-primary" style="background: #9c27b0; color: white; width: 100%; padding: 14px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold;">
                Complete Registration
            </button>
        </form>
        <p style="text-align: center; margin-top: 15px;"><a href="/" style="color: #999; text-decoration: none; font-size: 14px;">Back to Login</a></p>
    </div>
</body>
</html>
