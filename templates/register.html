<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Student Registration</title>
</head>
<body>
    <div class="card" style="max-width: 450px;">
        <h2 style="color: var(--primary-purple);">Student Registration</h2>
        <form action="/api/register" method="POST">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="text" name="enrollment" placeholder="Enrollment No" required>
            
            <select name="branch" required>
                <option value="" disabled selected>Select your Branch</option>
                <option value="IT1">Information Technology - 1</option>
                <option value="IT2">Information Technology - 2</option>
                <option value="AIML">AI & Machine Learning</option>
            </select>

            <input type="password" name="password" placeholder="Create Password" required>
            <button type="submit" class="btn-primary" style="background: var(--primary-purple); color: white;">Complete Registration</button>
        </form>
        <p><a href="/" style="color: var(--text-gray); font-size: 14px;">Back to Login</a></p>
    </div>
</body>
</html>
