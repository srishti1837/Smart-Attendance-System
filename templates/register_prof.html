<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Professor Registration</title>
</head>
<body>
    <div class="card" style="max-width: 400px; margin: 50px auto;">
        <h2 style="color: var(--primary-purple);">Admin Registration</h2>
        <p style="font-size: 13px; color: #666;">Enter your credentials and the departmental secret key.</p>
        
        <form action="/api/register" method="POST">
            <input type="text" name="name" placeholder="Full Name" required 
                   style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box;">
            
            <input type="email" name="email" placeholder="Official Email ID" required 
                   style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box;">
            
            <input type="hidden" name="enrollment" value="STAFF">
            <input type="hidden" name="branch" value="ADMIN">

            <input type="password" name="password" placeholder="Create Password" required 
                   style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box;">
            
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
            
            <label style="font-size: 12px; color: #9c27b0; display: block; margin-bottom: 5px; text-align: left;">Verify Admin Key:</label>
            <input type="password" name="prof_admin_code" placeholder="Department Admin Key" 
                   style="width: 100%; padding: 10px; margin-bottom: 15px; border: 2px solid #ce93d8; border-radius: 5px; box-sizing: border-box;" required>
            
            <button type="submit" class="btn-primary" style="background: var(--primary-purple); color: white; width: 100%; padding: 12px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold;">
                Complete Professor Registration
            </button>
        </form>
        <a href="/" style="font-size: 12px; color: #999; text-decoration: none; display: block; margin-top: 15px; text-align: center;">Back to Login</a>
    </div>
</body>
</html>
