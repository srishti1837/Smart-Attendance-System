<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Professor Registration</title>
</head>
<body>
    <div class="card">
        <h2 style="color: var(--primary-purple);">Admin Registration</h2>
        <p style="font-size: 13px; color: #666;">Enter your credentials and the departmental secret key.</p>
        
        <form action="/api/register" method="POST">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Official Email ID" required>
            
            <input type="hidden" name="enrollment" value="STAFF">
            <input type="hidden" name="branch" value="ADMIN">

            <input type="password" name="password" placeholder="Create Password" required>
            
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
            
            <input type="password" name="prof_admin_code" placeholder="Department Admin Key" style="border: 2px solid #ce93d8;" required>
            
            <button type="submit" class="btn-primary" style="background: var(--primary-purple); color: white;">Register as Professor</button>
        </form>
        <a href="/" style="font-size: 12px; color: #999; text-decoration: none; display: block; margin-top: 10px;">Back to Login</a>
    </div>
</body>
</html>
