<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Professor Control Panel</title>
    <style>
        :root {
            --primary-purple: #9c27b0;
            --dark-purple: #7b1fa2;
            --light-purple: #f3e5f5;
            --success-green: #2e7d32;
        }

        body { background-color: #fdf7fc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        .admin-header {
            background: var(--primary-purple);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .branch-nav {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            overflow-x: auto;
        }

        .branch-btn {
            padding: 10px 40px;
            border-radius: 8px;
            border: none;
            background: var(--light-purple);
            color: black;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .branch-btn.active { background: var(--primary-purple); color: white; }
        .btn-add { background: #4caf50; color: white; }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .qr-placeholder {
            border: 2px dashed #ce93d8;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            margin-top: 15px;
            color: #999;
            background: #fafafa;
            overflow: hidden;
        }

        .assignment-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .btn-action {
            width: 100%;
            padding: 15px;
            border-radius: 25px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .btn-qr { background: var(--primary-purple); }
        .btn-mark { background: #00796b; }
    </style>
</head>
<body>
<div style="max-width: 1000px; margin: 40px auto; padding: 0 20px;">
    
    
    <div class="admin-header" style="background: #9c27b0; color: white; padding: 30px; border-radius: 15px; margin-bottom: 20px; position: relative;">
    
    <h2 style="margin: 0;">Professor Control Panel</h2>
    
    <p style="margin: 10px 0 0 0; opacity: 0.9; font-size: 1.1em;">
        Welcome, {{ user.name }}
    </p>

    <a href="/logout" style="position: absolute; top: 20px; right: 20px;">
        <button style="background: red; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer;">
            Logout
        </button>
    </a>

</div>

    <div class="branch-nav" style="display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px;">
        {% for branch in branches %}
            <button class="branch-btn {% if loop.first %}active{% endif %}" 
                    onclick="switchBranch('{{ branch.id }}', this)"> 
                {{ branch.id }}
            </button>
        {% endfor %}
        <button class="branch-btn btn-add" onclick="toggleAddBranchModal(true)" 
                style="background: #4caf50; color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer;">
            + Add Branch
        </button>
    </div>

    {% if branches %}
    <div id="management-panel" style="background: white; border: 2px solid #333; border-radius: 15px; padding: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        
        <h3 id="active-branch-title" style="border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 25px;">
            Selected Branch: {{ branches[0].id }}
        </h3>

        <div style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: space-between; align-items: flex-start;">
            
            <div style="flex: 1; min-width: 200px; text-align: center;">
                <button onclick="startAttendance(currentBranch)" class="btn-start" 
                        style="background: #9c27b0; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold;">
                    🚀 Mark Attendance
                </button>
            </div>

            <div style="flex: 1; min-width: 200px; text-align: center;">
                <button onclick="window.open('/professor/mark-assignments/' + currentBranch, '_blank')" 
                        style="background: #00796b; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold;">
                    📝 Mark Submissions
                </button>
            </div>

            <div style="flex: 1; min-width: 200px; text-align: center;">
                <button onclick="window.open('/professor/add-marks/' + currentBranch, '_blank')" 
                        style="background: #e67e22; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold;">
                    📊 Add Marks
                </button>
            </div>
        </div>

        <div style="margin-top: 30px; text-align: center; border-top: 1px solid #eee; padding-top: 20px;">
            <button onclick="toggleAddAssignmentModal(true)" 
                    style="background: white; color: #333; border: 2px solid #333; padding: 12px 40px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%;">
                ➕ Add Assignment
            </button>
        </div>

        <div style="margin-top: 15px; text-align: center;">
            <button onclick="window.open('/professor/view-comments', '_blank')" 
                    style="background: #2196F3; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold;">
                💬 View Comments
            </button>
        </div>
    </div>
    {% endif %}
</div>

<div id="addBranchModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
    <div style="background: white; width: 300px; margin: 100px auto; padding: 25px; border-radius: 15px; text-align: center;">
        <h3>Add New Branch</h3>
        <input type="text" id="newBranchName" placeholder="e.g., IT2" style="width: 100%; padding: 10px; margin-bottom: 15px; text-transform: uppercase;">
        <button onclick="submitNewBranch()" style="background: #4caf50; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer;">Create</button>
        <button onclick="toggleAddBranchModal(false)" style="background: none; border: none; color: gray; margin-top: 10px; cursor: pointer;">Cancel</button>
    </div>
</div>

<div id="addAssignmentModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
    <div style="background: white; width: 400px; margin: 80px auto; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
        <h3 style="margin-bottom: 20px; color: #333;">Create New Assignment</h3>
        
        <input type="number" id="assnNum" placeholder="Assignment No (e.g., 1)" 
               style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px;">
        
        <input type="text" id="assnTitle" placeholder="Assignment Name" 
               style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px;">
        
        <textarea id="assnDesc" placeholder="Assignment Description" 
                  style="width: 100%; padding: 12px; height: 100px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit;"></textarea>
        
        <label style="font-size: 12px; color: #666; display: block; margin-bottom: 5px;">Submission Deadline:</label>
        <input type="date" id="assnDeadline" 
               style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px;">
        
        <button onclick="submitNewAssignment()" 
                style="background: #9c27b0; color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; font-size: 16px;">
            🚀 Publish Assignment
        </button>
        
        <button onclick="toggleAddAssignmentModal(false)" 
                style="background: none; border: none; color: #888; margin-top: 15px; cursor: pointer; width: 100%; font-size: 14px;">
            Cancel
        </button>
    </div>
</div>

<script>
    // Initializing currentBranch correctly from the first available branch
    let currentBranch = "{{ branches[0].id if branches else '' }}";

    function toggleAddBranchModal(show) {
        document.getElementById('addBranchModal').style.display = show ? 'block' : 'none';
    }

    async function submitNewBranch() {
        const branchName = document.getElementById('newBranchName').value.trim().toUpperCase();
        if (!branchName) return alert("Enter branch name");

        try {
            const response = await fetch('/api/create-branch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ branch_name: branchName })
            });

            if (response.ok) {
                location.reload(); 
            } else {
                const err = await response.json();
                alert("Error: " + err.error);
            }
        } catch (e) {
            alert("Connection error.");
        }
    }

    function switchBranch(branch, element) {
        currentBranch = branch;
        document.getElementById('active-branch-title').innerText = "Selected Branch: " + branch;
        
        // Update button UI (Highlighting active branch)
        document.querySelectorAll('.branch-btn').forEach(btn => btn.classList.remove('active'));
        if (element) {
            element.classList.add('active');
        } else {
            // Fallback for initial load
            const buttons = document.querySelectorAll('.branch-btn');
            buttons.forEach(btn => {
                if(btn.innerText.trim() === branch) btn.classList.add('active');
            });
        }
    }

    async function startAttendance(branchId) {
        if (!branchId) return alert("Select a branch first.");

        const titleText = document.getElementById('active-branch-title').innerText;
        if (titleText.includes("(Active)")) {
            alert("A session is already in progress.");
            return;
        }

        const startBtn = event.target; 
        startBtn.disabled = true;
        startBtn.innerText = "Starting Session..."; // Changed from "Initializing GPS..."

        const formData = new FormData();
        formData.append('branch_id', branchId);
        // Lat and Lng are no longer appended here

        try {
            const response = await fetch('/professor/start-attendance', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();

            if (result.status === "success") {
                // Open the live session (QR/Token window)
                window.open(`/professor/live-session/${branchId}`, '_blank');
                location.reload(); 
            } else {
                alert(result.message);
                location.reload();
            }
        } catch (err) {
            alert("Server Error.");
            startBtn.disabled = false;
            startBtn.innerText = "🚀 Mark Attendance";
        }
    }

    function toggleAddAssignmentModal(show) {
        // Ensure this modal exists in your HTML (as provided in previous step)
        const modal = document.getElementById('addAssignmentModal');
        if(modal) modal.style.display = show ? 'block' : 'none';
    }

    async function submitNewAssignment() {
        const num = document.getElementById('assnNum').value;
        const title = document.getElementById('assnTitle').value;
        const desc = document.getElementById('assnDesc').value;
        const deadline = document.getElementById('assnDeadline').value;

        if(!num || !title || !currentBranch) return alert("Please fill details and select branch");

        const response = await fetch('/api/create-assignment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                branch_id: currentBranch,
                num: num,
                title: title,
                desc: desc,
                deadline: deadline
            })
        });

        if (response.ok) {
            alert("Assignment Published!");
            toggleAddAssignmentModal(false);
        }
    }
</script>
</body>
