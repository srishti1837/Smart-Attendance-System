<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Professor Control Panel</title>
    <style>
        :root {
            --primary-purple: #9c27b0;
            --dark-purple: #7b1fa2;
            --light-purple: #f3e5f5;
            --success-green: #2e7d32;
        }

        body { background-color: #fdf7fc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        .admin-header {
            background: var(--primary-purple);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .branch-nav {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            overflow-x: auto;
        }

        .branch-btn {
            padding: 10px 40px;
            border-radius: 8px;
            border: none;
            background: var(--light-purple);
            color: black;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .branch-btn.active { background: var(--primary-purple); color: white; }
        .btn-add { background: #4caf50; color: white; }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .qr-placeholder {
            border: 2px dashed #ce93d8;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            margin-top: 15px;
            color: #999;
            background: #fafafa;
            overflow: hidden;
        }

        .assignment-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .btn-action {
            width: 100%;
            padding: 15px;
            border-radius: 25px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .btn-qr { background: var(--primary-purple); }
        .btn-mark { background: #00796b; }
    </style>
</head>
<body>

<div style="max-width: 1000px; margin: 40px auto; padding: 0 20px;">
    
    <div class="admin-header">
        <h2 style="margin: 0;">Professor Control Panel</h2>
        <p style="margin: 10px 0 0 0; opacity: 0.8;">Welcome, {{ user.name }}</p>
    </div>

    <div class="branch-nav">
        {% for branch in branches %}
            <button class="branch-btn {% if loop.first %}active{% endif %}" 
                    onclick="switchBranch('{{ branch }}')">
                {{ branch }}
            </button>
        {% endfor %}
        <button class="branch-btn btn-add" onclick="toggleAddBranchModal(true)" style="background: #4caf50; color: white;">
            + Add Branch
        </button>
    </div>

    <div class="main-grid">
        <div>
            <h3 id="active-branch-title">Branch: {{ branches[0] if branches else 'None' }}</h3>
            <p><b>Attendance Management</b></p>
            
            <button onclick="startAttendance()" class="btn-action btn-qr">
                🚀 Start Attendance QR
            </button>

            <div id="qr-container" class="qr-placeholder">
                QR will appear in live window
            </div>
            
            <button onclick="stopAttendance()" class="btn-action" style="background: #e53935; margin-top: 10px;">
                🛑 Stop Session
            </button>
        </div>

        <div>
            <p style="margin-top: 40px;"><b>Assignment Marking</b></p>
            <button onclick="saveAssignments()" class="btn-action btn-mark">
                📝 Mark Submissions
            </button>

            <div id="assignment-list">
                <p style="color: gray; font-size: 0.9em;">Select a branch to view students</p>
            </div>
        </div>
    </div>
</div>

<div id="addBranchModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
    <div style="background: white; width: 300px; margin: 100px auto; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
        <h3>Add New Branch</h3>
        <input type="text" id="newBranchName" placeholder="e.g., CS-A" 
               style="width: 85%; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; text-transform: uppercase;">
        <br>
        <button onclick="submitNewBranch()" style="background: #9c27b0; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%;">
            Create Branch
        </button>
        <button onclick="toggleAddBranchModal(false)" style="background: none; border: none; color: gray; margin-top: 10px; cursor: pointer;">
            Cancel
        </button>
    </div>
</div>

<script>
    // Initialize currentBranch with the first branch from Python
    let currentBranch = "{{ branches[0] if branches else '' }}";

    function toggleAddBranchModal(show) {
        document.getElementById('addBranchModal').style.display = show ? 'block' : 'none';
    }

    async function submitNewBranch() {
        const branchName = document.getElementById('newBranchName').value.trim().toUpperCase();
        if (!branchName) return alert("Enter branch name");

        const response = await fetch('/api/create-branch', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ branch_name: branchName })
        });

        if (response.ok) {
            location.reload(); // Refresh to update the branch navigation buttons
        } else {
            const err = await response.json();
            alert("Error: " + err.error);
        }
    }

    function switchBranch(branch) {
        currentBranch = branch;
        document.getElementById('active-branch-title').innerText = "Branch: " + branch;
        
        // Update button UI
        document.querySelectorAll('.branch-btn').forEach(btn => btn.classList.remove('active'));
        if (event) event.target.classList.add('active');

        // Load the student list for assignment marking
        loadAssignmentData(branch);
    }

    async function loadAssignmentData(branchId) {
        const res = await fetch(`/api/users/${branchId}`);
        if (!res.ok) return;
        
        const students = await res.json();
        const listContainer = document.getElementById('assignment-list');
        listContainer.innerHTML = "";

        if (students.length === 0) {
            listContainer.innerHTML = "<p>No students registered in this branch.</p>";
            return;
        }

        students.forEach(s => {
            listContainer.innerHTML += `
                <div class="assignment-row" style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
                    <span>${s.name} <small>(${s.enrollment_no})</small></span>
                    <div>
                        <input type="checkbox" class="assn-check" data-email="${s.email}" data-id="assn1">
                    </div>
                </div>`;
        });
    }

    function startAttendance() {
        if (!currentBranch) return alert("Select a branch first");
        window.open(`/professor/live-session/${currentBranch}`, '_blank', 'width=1200,height=800');
    }

    async function stopAttendance() {
        const response = await fetch(`/professor/stop-attendance/${currentBranch}`);
        if(response.ok) {
            alert("Attendance Session Closed.");
        }
    }

    // Load initial data on page load
    window.onload = () => {
        if (currentBranch) loadAssignmentData(currentBranch);
    };
</script>
